<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Aluvima Mérida — Aluminio Vidrio Acero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8B1A2B"/>
      <stop offset="100%" stop-color="#6A1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Path para texto curvo SUPERIOR -->
    <path id="curveTop" d="M 76 256 A 180 180 0 0 1 436 256" fill="none"/>
    <!-- Path para texto curvo INFERIOR -->
    <path id="curveBottom" d="M 80 264 A 176 176 0 0 0 432 264" fill="none"/>
  </defs>

  <!-- Fondo del círculo -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Anillo decorativo blanco interior fino -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.35"/>
  <!-- Highlight superior -->
  <circle cx="256" cy="256" r="248" fill="url(#glow)"/>

  <!-- Texto superior curvo -->
  <text font-family="Montserrat, sans-serif" font-size="28" font-weight="700"
        fill="#FFFFFF" letter-spacing="4">
    <textPath href="#curveTop" startOffset="50%" text-anchor="middle">
      Modernizando tus espacios
    </textPath>
  </text>

  <!-- Símbolo central pequeño (rombo encima) -->
  <g transform="translate(256 184)">
    <polygon points="0,-18 18,0 0,18 -18,0" fill="#FFFFFF" opacity="0.95"/>
    <polygon points="0,-10 10,0 0,10 -10,0" fill="#8B1A2B"/>
  </g>

  <!-- ALUVIMA central -->
  <text x="256" y="280" font-family="Montserrat, sans-serif" font-size="74" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="2">ALUVIMA</text>

  <!-- Subtítulo: Aluminio | Vidrio | Acero -->
  <text x="256" y="322" font-family="Montserrat, sans-serif" font-size="20" font-weight="600"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="3" opacity="0.92">
    Aluminio · Vidrio · Acero
  </text>

  <!-- Texto inferior curvo -->
  <text font-family="Montserrat, sans-serif" font-size="20" font-weight="600"
        fill="#FFFFFF" letter-spacing="3" opacity="0.85">
    <textPath href="#curveBottom" startOffset="50%" text-anchor="middle">
      Mérida · Venezuela
    </textPath>
  </text>
</svg>
